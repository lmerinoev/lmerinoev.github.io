<!DOCTYPE html>
<html>
  <head>
    <title>Crayons AR :)</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://rawcdn.githack.com/AR-js-org/AR.js/3.3.2/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam;">
      <a-assets>
        <img id="subjectImage" src="images/subject_ar.png">
      </a-assets>
      
      <a-entity camera></a-entity>

      <!-- Initially hidden image entity -->
      <a-image id="arImage" src="#subjectImage" width="1" height="1" position="0 0 -2" visible="false" rotation="90 0 0"></a-image>
    </a-scene>

    <script>
      document.querySelector('a-scene').addEventListener('click', function (event) {
        var image = document.getElementById('arImage');
        var scene = document.querySelector('a-scene');
        
        // Calculate the position for the image to be placed
        var touchPoint = event.detail.intersection.point;
        image.setAttribute('position', touchPoint);

        // Make the image visible
        image.setAttribute('visible', 'true');
      });
    </script>
  </body>
</html>
