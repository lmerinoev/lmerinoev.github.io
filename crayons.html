<!DOCTYPE html>
<html>
  <head>
    <title>Crayons AR :)</title>
    <meta property="og:title" content="Crayons AR :)">
    <meta property="og:description" content="Augmented reality crayons experience using WebXR">
    <meta property="og:image" content="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:creator" content="@HipsterCow">
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://rawcdn.githack.com/AR-js-org/AR.js/3.3.2/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-gesture-detector-component@4.0.3/dist/aframe-gesture-detector-component.min.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@5.1.0/dist/aframe-event-set-component.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam;">
      <a-assets>
        <img id="subjectImage" src="images/subject_ar.png">
      </a-assets>
      
      <a-entity camera></a-entity>

      <a-image id="arImage" 
               src="#subjectImage" 
               width="1" 
               height="1" 
               position="0 0 -2" 
               rotation="0 0 0" 
               visible="false"
               gesture-detector>
      </a-image>
    </a-scene>

    <script>
      document.querySelector('a-scene').addEventListener('click', function (event) {
        var image = document.getElementById('arImage');
        var camera = document.querySelector('[camera]');
        var camPos = camera.getAttribute('position');
        var camRot = camera.getAttribute('rotation');

        // Calculate the position in front of the camera
        var newPos = {
          x: camPos.x + Math.sin(camRot.y * (Math.PI / 180)) * 2,
          y: camPos.y,
          z: camPos.z - Math.cos(camRot.y * (Math.PI / 180)) * 2
        };

        // Set the new position and make the image visible
        image.setAttribute('position', newPos);
        image.setAttribute('visible', 'true');
      });

      var image = document.getElementById('arImage');
      var initialScale = {x: 1, y: 1, z: 1};

      image.addEventListener('pinchstarted', function (evt) {
        initialScale = this.getAttribute('scale');
      });

      image.addEventListener('pinchmoved', function (evt) {
        var scaleFactor = evt.detail.scale / evt.detail.previousScale;
        var newScale = {
          x: initialScale.x * scaleFactor,
          y: initialScale.y * scaleFactor,
          z: initialScale.z * scaleFactor
        };
        this.setAttribute('scale', newScale);
      });

      image.addEventListener('dragstart', function (evt) {
        this.setAttribute('gesture-detector', 'enabled', true);
      });

      image.addEventListener('dragmove', function (evt) {
        var position = this.getAttribute('position');
        position.x += evt.detail.positionChange.x;
        position.y += evt.detail.positionChange.y;
        position.z += evt.detail.positionChange.z;
        this.setAttribute('position', position);
      });

      image.addEventListener('dragend', function (evt) {
        this.setAttribute('gesture-detector', 'enabled', false);
      });
    </script>
  </body>
</html>
