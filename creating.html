<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/art/favicon.svg" type="image/svg+xml">
    <title>Person detector </title>
    <meta property="og:title" content="Person detector">
    <meta property="og:description" content="Real-time person detection using computer vision in the browser">
    <meta property="og:image" content="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:creator" content="@HipsterCow">
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80">
    <style>
        body {
          display: flex;
          flex-direction: column;
          align-items: center;
          padding: 10px;
        }
        #canvas, #video {
          max-width: 100%;
          height: auto;
        }
      </style>
</head>
<body>
    <label for="videoOptions">Choose a video:</label>
    <select id="videoOptions">
        <option value="">Select a video...</option>
        <br>
        <option value="luke.mp4">Video 1</option>
        <option value="sam.mp4">Video 2</option>
        <br>
        <option value="upload">Upload Video</option>
        <br>
        <option value="webcam">Webcam</option> <!-- Added webcam option -->
    </select>
    <button id="toggleCamera">Switch Camera</button>
    <input type="file" id="fileInput" accept="video/*" style="display: none;"><br/>
    <video controls style="display:none"></video><br/>
    <canvas></canvas><br/>
    <button id="process">Process</button>&nbsp;
  
    <script src="object_detector.js" defer></script>
</body>
</html>
