<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Coffee-Bag AR</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <!-- (optional) gesture components -->
  <script src="https://unpkg.com/aframe-gesture-detector-component@4.0.3/dist/aframe-gesture-detector-component.min.js"></script>
  <script src="https://unpkg.com/aframe-event-set-component@5.1.0/dist/aframe-event-set-component.min.js"></script>

  <style>body{margin:0;overflow:hidden}</style>
</head>
<body>
  <a-scene
      embedded
      vr-mode-ui="enabled:false"
      renderer="logarithmicDepthBuffer:true"
      arjs="sourceType:webcam; detectionMode:mono_and_matrix; matrixCodeType:3x3; debugUIEnabled:false">

    <!-- preload your overlay asset -->
    <a-assets>
      <img id="coffeeLabel" src="images/IMG_1541.jpeg">
    </a-assets>

    <!-- AprilTag ID 5 -->
    <a-marker type="barcode" value="5">
      <a-image src="#coffeeLabel"
               width="0.08" height="0.08"
               position="0 0.01 0"
               rotation="-90 0 0"
               gesture-detector>
      </a-image>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
