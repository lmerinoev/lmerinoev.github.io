<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Coffee-Bag AR</title>
  <meta property="og:title" content="Coffee-Bag AR">
  <meta property="og:description" content="Augmented reality experience for coffee bag labels">
  <meta property="og:image" content="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:creator" content="@HipsterCow">
  <meta name="twitter:image" content="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80">

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
  <style>body{margin:0;overflow:hidden}</style>
</head>
<body>
  <a-scene
      embedded
      vr-mode-ui="enabled:false"
      renderer="logarithmicDepthBuffer:true"
      arjs="sourceType:webcam; detectionMode:mono_and_matrix; matrixCodeType:4x4; debugUIEnabled:false">

    <a-assets>
      <img id="coffeeLabel" src="images/IMG_1541.jpeg" crossorigin="anonymous">
    </a-assets>

    <!-- AprilTag tag25h9 (4×4), ID 5 -->
    <a-marker type="barcode" value="5">
      <a-image src="#coffeeLabel"
               width="0.08" height="0.08"
               position="0 0.01 0"
               rotation="-90 0 0">
      </a-image>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
